<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF 워터마크 PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
<style>
:root {
  --bg: #0a0e1a;
  --surface: #111827;
  --surface2: #1f2937;
  --border: #2d3748;
  --accent: #818cf8;
  --accent-glow: rgba(129,140,248,0.12);
  --text: #f9fafb;
  --text2: #9ca3af;
  --text3: #6b7280;
  --success: #34d399;
  --success-bg: rgba(52,211,153,0.1);
  --danger: #f87171;
  --danger-bg: rgba(248,113,113,0.1);
  --r: 12px;
  --rs: 8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:2rem 1rem 5rem;line-height:1.6}
.wrap{max-width:680px;margin:0 auto}

/* Header */
.hdr{text-align:center;margin-bottom:2.5rem}
.hdr-badge{display:inline-block;background:var(--accent-glow);border:1px solid var(--accent);color:var(--accent);font-size:.72rem;font-weight:700;letter-spacing:.1em;padding:.25rem .85rem;border-radius:999px;margin-bottom:1rem;text-transform:uppercase}
.hdr h1{font-size:clamp(1.6rem,5vw,2.4rem);font-weight:700;background:linear-gradient(135deg,#818cf8,#c084fc,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:.4rem}
.hdr p{color:var(--text2);font-size:.88rem}

/* Mode */
.modes{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:1rem}
.mode-btn{display:flex;align-items:center;gap:.75rem;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:1rem 1.1rem;cursor:pointer;color:var(--text2);transition:all .2s;text-align:left}
.mode-btn:hover{border-color:var(--accent);color:var(--text)}
.mode-btn.on{border-color:var(--accent);background:var(--accent-glow);color:var(--text)}
.mode-ico{font-size:1.4rem;flex-shrink:0}
.mode-tag{font-size:.7rem;color:var(--accent);font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.mode-desc{font-size:.82rem;margin-top:.1rem}

/* Card */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.4rem 1.5rem;margin-bottom:.9rem}
.card-ttl{font-size:.75rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:1rem}

/* Drop Zone */
.drop{border:2px dashed var(--border);border-radius:var(--rs);padding:2.2rem 1rem;text-align:center;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.drop::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center,var(--accent-glow),transparent 70%);opacity:0;transition:opacity .2s}
.drop:hover,.drop.drag{border-color:var(--accent)}
.drop:hover::before,.drop.drag::before{opacity:1}
.drop-ico{font-size:2.2rem;margin-bottom:.6rem;position:relative;z-index:1}
.drop p{color:var(--text2);font-size:.88rem;position:relative;z-index:1}
.drop-hint{display:inline-block;margin-top:.4rem;font-size:.76rem;color:var(--text3);position:relative;z-index:1}

/* File list */
.flist{margin-top:.65rem;display:flex;flex-direction:column;gap:.35rem}
.fitem{display:flex;align-items:center;gap:.55rem;padding:.55rem .75rem;background:var(--surface2);border-radius:var(--rs);font-size:.83rem}
.fico{font-size:.95rem;flex-shrink:0}
.fname{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fsize{color:var(--text3);font-size:.76rem;flex-shrink:0}
.frm{background:none;border:none;color:var(--text3);cursor:pointer;padding:.1rem .3rem;border-radius:4px;transition:color .15s,background .15s;flex-shrink:0;font-size:.9rem}
.frm:hover{color:var(--danger);background:var(--danger-bg)}

/* Form */
.fg{margin-bottom:.9rem}
.fg:last-child{margin-bottom:0}
.fg label{display:block;font-size:.8rem;color:var(--text2);margin-bottom:.35rem;font-weight:500}
.fg input[type=text]{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);padding:.6rem .85rem;color:var(--text);font-size:.88rem;font-family:inherit;outline:none;transition:border-color .15s}
.fg input[type=text]:focus{border-color:var(--accent)}
input[type=range]{width:100%;accent-color:var(--accent);cursor:pointer;margin-top:.15rem}
input[type=color]{width:100%;height:40px;border:1px solid var(--border);border-radius:var(--rs);background:var(--surface2);padding:3px;cursor:pointer}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:.9rem;margin-top:.9rem}
@media(max-width:480px){.sgrid{grid-template-columns:1fr}}

/* Watermark list */
.wmlist{display:flex;flex-direction:column;gap:.45rem;margin-bottom:.65rem}
.wmi{display:flex;gap:.45rem;align-items:center}
.wmi input[type=text]{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);padding:.55rem .75rem;color:var(--text);font-size:.86rem;font-family:inherit;outline:none;transition:border-color .15s}
.wmi input[type=text]:focus{border-color:var(--accent)}
.wmi .wrm{background:none;border:1px solid var(--border);color:var(--text3);cursor:pointer;padding:.48rem .6rem;border-radius:var(--rs);font-size:.82rem;transition:all .15s;flex-shrink:0}
.wmi .wrm:hover{color:var(--danger);border-color:var(--danger);background:var(--danger-bg)}
.btn-add{background:none;border:1px dashed var(--border);color:var(--text2);cursor:pointer;padding:.5rem 1rem;border-radius:var(--rs);font-size:.83rem;font-family:inherit;width:100%;transition:all .15s}
.btn-add:hover{border-color:var(--accent);color:var(--accent)}

/* Quality */
.qgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem;margin-top:.5rem}
.qopt{position:relative}
.qopt input[type=radio]{position:absolute;opacity:0;width:0}
.qopt label{display:block;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--rs);padding:.6rem .5rem;text-align:center;cursor:pointer;font-size:.78rem;color:var(--text2);transition:all .15s}
.qopt label:hover{border-color:var(--accent);color:var(--text)}
.qopt input[type=radio]:checked+label{border-color:var(--accent);background:var(--accent-glow);color:var(--accent);font-weight:700}
.qn{display:block;font-weight:600}
.qh{display:block;color:var(--text3);font-size:.7rem;margin-top:.1rem}

/* Info box */
.ibox{background:rgba(129,140,248,.07);border:1px solid rgba(129,140,248,.2);border-radius:var(--rs);padding:.7rem 1rem;font-size:.8rem;color:var(--text2);display:flex;gap:.6rem;align-items:flex-start;margin-top:.9rem}

/* Process button */
.btn-go{display:block;width:100%;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border:none;border-radius:var(--r);padding:1rem;font-size:1rem;font-weight:700;font-family:inherit;cursor:pointer;transition:all .2s;margin:1.25rem 0;box-shadow:0 4px 16px rgba(99,102,241,.4)}
.btn-go:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 22px rgba(99,102,241,.5)}
.btn-go:disabled{opacity:.45;cursor:not-allowed;transform:none}

/* Progress */
.prog{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.2rem 1.4rem;margin-bottom:.9rem}
.prog-lbl{font-size:.83rem;color:var(--text2);margin-bottom:.55rem;min-height:1.2em}
.prog-bar{height:6px;background:var(--surface2);border-radius:999px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,#6366f1,#8b5cf6);border-radius:999px;transition:width .3s ease;width:0%}

/* Results */
.results{display:flex;flex-direction:column;gap:.45rem;margin-bottom:2rem}
.ri{display:flex;align-items:center;gap:.7rem;padding:.8rem 1rem;border-radius:var(--rs);font-size:.86rem}
.ri.ok{background:var(--success-bg);border:1px solid rgba(52,211,153,.2)}
.ri.err{background:var(--danger-bg);border:1px solid rgba(248,113,113,.2)}
.ri-ico{font-size:.95rem;flex-shrink:0}
.ri-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ri-msg{font-size:.76rem;color:var(--danger)}
.btn-dl{background:linear-gradient(135deg,#059669,#10b981);color:#fff;border:none;border-radius:6px;padding:.38rem .8rem;font-size:.78rem;font-weight:700;cursor:pointer;text-decoration:none;transition:all .15s;white-space:nowrap;flex-shrink:0}
.btn-dl:hover{transform:translateY(-1px);box-shadow:0 3px 10px rgba(16,185,129,.4)}
</style>
</head>
<body>
<div class="wrap">

  <header class="hdr">
    <div class="hdr-badge">PDF Watermark PRO</div>
    <h1>PDF 워터마크</h1>
    <p>한글 지원 &middot; 워터마크 제거 방지 &middot; 고급 설정</p>
  </header>

  <div class="modes">
    <button class="mode-btn on" id="mb1" onclick="setMode(1)">
      <span class="mode-ico">📑</span>
      <div>
        <div class="mode-tag">모드 1</div>
        <div class="mode-desc">여러 PDF → 같은 워터마크</div>
      </div>
    </button>
    <button class="mode-btn" id="mb2" onclick="setMode(2)">
      <span class="mode-ico">👤</span>
      <div>
        <div class="mode-tag">모드 2</div>
        <div class="mode-desc">한 PDF → 이름별 개별 파일</div>
      </div>
    </button>
  </div>

  <div class="card">
    <div class="card-ttl">파일 선택</div>
    <div class="drop" id="dz" onclick="document.getElementById('fi').click()">
      <div class="drop-ico">📁</div>
      <p>PDF를 드래그하거나 클릭해서 선택</p>
      <span class="drop-hint" id="dhint">여러 파일 선택 가능</span>
    </div>
    <input type="file" id="fi" accept=".pdf" multiple hidden>
    <div class="flist" id="flist"></div>
  </div>

  <div class="card">
    <div class="card-ttl">워터마크 텍스트</div>

    <div id="m1txt">
      <div class="fg">
        <input type="text" id="wmtxt" placeholder="예: 무단 복제 금지 · 홍길동" value="무단 복제 금지">
      </div>
    </div>

    <div id="m2txt" style="display:none">
      <div class="wmlist" id="wmlist"></div>
      <button class="btn-add" onclick="addWm()">+ 이름 추가 (학생별 개별 파일 생성)</button>
    </div>

    <div class="sgrid">
      <div class="fg">
        <label>글자 크기 — <span id="fsv">60</span>px</label>
        <input type="range" id="fs" min="20" max="200" value="60"
               oninput="document.getElementById('fsv').textContent=this.value">
      </div>
      <div class="fg">
        <label>투명도 — <span id="opv">30</span>%</label>
        <input type="range" id="op" min="5" max="100" value="30"
               oninput="document.getElementById('opv').textContent=this.value">
      </div>
      <div class="fg">
        <label>각도 — <span id="agv">-45</span>°</label>
        <input type="range" id="ag" min="-90" max="90" value="-45"
               oninput="document.getElementById('agv').textContent=this.value">
      </div>
      <div class="fg">
        <label>밀도 — <span id="dnv">4</span></label>
        <input type="range" id="dn" min="1" max="8" value="4"
               oninput="document.getElementById('dnv').textContent=this.value">
      </div>
      <div class="fg">
        <label>색상</label>
        <input type="color" id="cl" value="#808080">
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-ttl">출력 품질</div>
    <div class="qgrid">
      <div class="qopt">
        <input type="radio" name="q" id="q1" value="1.5">
        <label for="q1"><span class="qn">일반</span><span class="qh">빠름 · 파일 작음</span></label>
      </div>
      <div class="qopt">
        <input type="radio" name="q" id="q2" value="2" checked>
        <label for="q2"><span class="qn">고품질</span><span class="qh">기본 추천</span></label>
      </div>
      <div class="qopt">
        <input type="radio" name="q" id="q3" value="3">
        <label for="q3"><span class="qn">인쇄용</span><span class="qh">느림 · 선명</span></label>
      </div>
    </div>
    <div class="ibox">
      <span>🔒</span>
      <span>PDF를 이미지로 변환 후 워터마크를 픽셀에 직접 새깁니다. Adobe Acrobat · 알PDF의 "워터마크 제거" 기능으로는 지울 수 없습니다.</span>
    </div>
  </div>

  <button class="btn-go" id="gobtn" onclick="run()">워터마크 적용하기 →</button>

  <div class="prog" id="progbox" style="display:none">
    <div class="prog-lbl" id="proglbl">처리 중...</div>
    <div class="prog-bar"><div class="prog-fill" id="progfill"></div></div>
  </div>

  <div class="results" id="results"></div>

</div>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let mode = 1, files = [];

/* ── Mode ── */
function setMode(m) {
  mode = m;
  document.getElementById('mb1').classList.toggle('on', m === 1);
  document.getElementById('mb2').classList.toggle('on', m === 2);
  document.getElementById('m1txt').style.display = m === 1 ? '' : 'none';
  document.getElementById('m2txt').style.display = m === 2 ? '' : 'none';
  document.getElementById('fi').multiple = m === 1;
  document.getElementById('dhint').textContent = m === 1 ? '여러 파일 선택 가능' : 'PDF 파일 1개 선택';
  if (m === 2 && !document.querySelector('.wmi')) { addWm('홍길동'); addWm('이순신'); }
  files = []; renderFiles();
}

/* ── Files ── */
const dz = document.getElementById('dz');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag'));
dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('drag'); intake(e.dataTransfer.files); });
document.getElementById('fi').addEventListener('change', e => intake(e.target.files));

function intake(list) {
  const pdfs = Array.from(list).filter(f => f.name.toLowerCase().endsWith('.pdf'));
  files = mode === 1 ? [...files, ...pdfs] : [pdfs[0]].filter(Boolean);
  renderFiles();
}
function renderFiles() {
  document.getElementById('flist').innerHTML = files.map((f, i) => `
    <div class="fitem">
      <span class="fico">📄</span>
      <span class="fname">${esc(f.name)}</span>
      <span class="fsize">${fmtSz(f.size)}</span>
      <button class="frm" onclick="rmFile(${i})">✕</button>
    </div>`).join('');
}
function rmFile(i) { files.splice(i, 1); renderFiles(); }
function fmtSz(b) { return b > 1048576 ? (b/1048576).toFixed(1)+' MB' : (b/1024).toFixed(0)+' KB'; }
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* ── Watermark list ── */
function addWm(v='') {
  const list = document.getElementById('wmlist');
  const d = document.createElement('div'); d.className = 'wmi';
  d.innerHTML = `<input type="text" placeholder="이름 또는 워터마크 텍스트" value="${esc(v)}">
    <button class="wrm" onclick="rmWm(this)">✕</button>`;
  list.appendChild(d);
}
function rmWm(btn) {
  if (document.querySelectorAll('.wmi').length > 1) btn.closest('.wmi').remove();
}
function getTexts() {
  if (mode === 1) {
    const t = document.getElementById('wmtxt').value.trim();
    return t ? [t] : [];
  }
  return Array.from(document.querySelectorAll('.wmi input')).map(i => i.value.trim()).filter(Boolean);
}

/* ── Canvas watermark ── */
function stamp(canvas, texts, opts) {
  const ctx = canvas.getContext('2d');
  const { sz, color, op, deg, dn } = opts;
  ctx.save();
  ctx.globalAlpha = op;
  ctx.fillStyle = color;
  ctx.font = `bold ${sz}px 'Malgun Gothic','맑은 고딕','Apple SD Gothic Neo','Nanum Gothic','Noto Sans KR',sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const angle = deg * Math.PI / 180;
  const step = Math.min(canvas.width, canvas.height) / dn;
  const cx = canvas.width / 2, cy = canvas.height / 2;
  const n = Math.ceil(Math.sqrt(canvas.width**2 + canvas.height**2) / step) + 2;
  for (let r = -n; r <= n; r++) {
    for (let c = -n; c <= n; c++) {
      const txt = texts[Math.abs(r * 3 + c + texts.length * 999) % texts.length];
      ctx.save();
      ctx.translate(cx + c * step, cy + r * step);
      ctx.rotate(angle);
      ctx.fillText(txt, 0, 0);
      ctx.restore();
    }
  }
  ctx.restore();
}

/* ── PDF render ── */
async function renderPage(pdf, num, scale) {
  const page = await pdf.getPage(num);
  const vp = page.getViewport({ scale });
  const canvas = document.createElement('canvas');
  canvas.width = Math.round(vp.width);
  canvas.height = Math.round(vp.height);
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  await page.render({ canvasContext: ctx, viewport: vp }).promise;
  return canvas;
}

function toBytes(dataURL) {
  const b64 = dataURL.split(',')[1];
  const raw = atob(b64);
  const u8 = new Uint8Array(raw.length);
  for (let i = 0; i < raw.length; i++) u8[i] = raw.charCodeAt(i);
  return u8;
}

function safeName(s) { return s.replace(/[\\/:*?"<>|]/g,'_').trim().slice(0,40); }

/* ── Progress ── */
function prog(lbl, pct) {
  document.getElementById('progbox').style.display = '';
  document.getElementById('proglbl').textContent = lbl;
  document.getElementById('progfill').style.width = pct + '%';
}

/* ── Main ── */
async function run() {
  if (!files.length) { alert('PDF 파일을 선택해주세요.'); return; }
  const texts = getTexts();
  if (!texts.length) { alert('워터마크 텍스트를 입력해주세요.'); return; }

  const opts = {
    sz:  parseInt(document.getElementById('fs').value),
    color: document.getElementById('cl').value,
    op:  parseInt(document.getElementById('op').value) / 100,
    deg: parseInt(document.getElementById('ag').value),
    dn:  parseInt(document.getElementById('dn').value),
  };
  const scale = parseFloat(document.querySelector('input[name="q"]:checked').value);

  const btn = document.getElementById('gobtn');
  btn.disabled = true;
  document.getElementById('results').innerHTML = '';
  prog('준비 중...', 0);

  const tasks = mode === 1
    ? files.map(f => ({ file: f, texts, out: f.name.replace(/\.pdf$/i, '_워터마크.pdf') }))
    : texts.map(t => ({ file: files[0], texts: [t], out: files[0].name.replace(/\.pdf$/i, `_${safeName(t)}.pdf`) }));

  for (let ti = 0; ti < tasks.length; ti++) {
    const task = tasks[ti];
    try {
      const buf = await task.file.arrayBuffer();
      const src = await pdfjsLib.getDocument({ data: new Uint8Array(buf) }).promise;
      const total = src.numPages;
      const outPdf = await PDFLib.PDFDocument.create();

      for (let p = 1; p <= total; p++) {
        const pct = ((ti + p / total) / tasks.length) * 100;
        prog(`[${ti+1}/${tasks.length}] ${task.file.name} — 페이지 ${p}/${total}`, pct);

        const canvas = await renderPage(src, p, scale);
        stamp(canvas, task.texts, opts);

        const imgBytes = toBytes(canvas.toDataURL('image/jpeg', 0.85));
        const img = await outPdf.embedJpg(imgBytes);
        const pg = outPdf.addPage([canvas.width, canvas.height]);
        pg.drawImage(img, { x: 0, y: 0, width: canvas.width, height: canvas.height });

        await new Promise(r => setTimeout(r, 0));
      }

      const bytes = await outPdf.save();
      addOk(task.out, bytes);
    } catch (err) {
      addErr(task.file.name, err.message);
    }
  }

  prog(`완료! ${tasks.length}개 파일 처리됨`, 100);
  btn.disabled = false;
}

function addOk(name, bytes) {
  const url = URL.createObjectURL(new Blob([bytes], { type: 'application/pdf' }));
  const d = document.createElement('div'); d.className = 'ri ok';
  d.innerHTML = `<span class="ri-ico">✅</span><span class="ri-name">${esc(name)}</span>
    <a href="${url}" download="${esc(name)}" class="btn-dl">다운로드</a>`;
  document.getElementById('results').appendChild(d);
}
function addErr(name, msg) {
  const d = document.createElement('div'); d.className = 'ri err';
  d.innerHTML = `<span class="ri-ico">❌</span><span class="ri-name">${esc(name)}</span><span class="ri-msg">${esc(msg)}</span>`;
  document.getElementById('results').appendChild(d);
}
</script>
</body>
</html>
